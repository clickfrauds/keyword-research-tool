name: Keyword Research Pipeline

on:
  workflow_dispatch:
    inputs:
      business_name:
        description: "Business name"
        required: true
      niche_description:
        description: "What the business does (e.g. 'AC repair and installation company')"
        required: true
      target_location:
        description: "Target location (e.g. 'Dubai, UAE', or 'N/A' if not local)"
        required: true
      seed_keywords:
        description: "Comma-separated seed keywords for this client"
        required: true
      research_type:
        description: "Deliverable type: google_ads (campaigns+script) | seo (website-builder content plan) | both"
        required: false
        default: 'google_ads'
        type: choice
        options:
          - google_ads
          - seo
          - both
      request_id:
        description: "Unique id for this run — set automatically when triggered from the Netlify form. Leave blank for manual runs."
        required: false
      existing_campaign:
        description: "EXISTING ACCOUNT MODE: client ki already-running campaign ka naam (naye ad groups isi mein jayenge)"
        required: false
        default: ''
      existing_ad_groups:
        description: "EXISTING ACCOUNT MODE: client ke already-live ad groups (comma-separated) — 2-way negative siloing ke liye"
        required: false
        default: ''
      max_ad_groups:
        description: "Max NEW ad groups (chhote/niche keyword sets ke liye 1-2 rakhen)"
        required: false
        default: '10'

# Needed so Stage 5 can push the finished report to the results-data branch
# using the automatic GITHUB_TOKEN (no extra secret required for this part).
permissions:
  contents: write

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve request id (fallback for manual runs)
        id: reqid
        run: |
          if [ -z "${{ github.event.inputs.request_id }}" ]; then
            echo "value=manual-${{ github.run_id }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.inputs.request_id }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Stage 1 - Pull real keyword data from Google Ads
        env:
          GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CLIENT_ID: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
          GOOGLE_ADS_USE_PROTO_PLUS: "true"
          SEED_KEYWORDS: ${{ github.event.inputs.seed_keywords }}
        run: python scripts/keyword_research.py

      - name: Stage 2 - Filter and cluster keywords (niche-agnostic)
        run: python scripts/filter_and_cluster.py keyword_data_output.txt

      - name: Stage 2.5 - Score keywords (Python data refinery — free, no API)
        env:
          TARGET_LOCATION: ${{ github.event.inputs.target_location }}
          MAX_KEYWORDS_FOR_AI: "400"
        run: python scripts/score_keywords.py

      - name: Stage 3 - Claude campaigns + ad groups + landing pages (~$0.30/run)
        if: ${{ github.event.inputs.research_type != 'seo' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: claude-sonnet-5
          CLAUDE_EFFORT: "medium"
          MAX_AD_GROUPS: ${{ github.event.inputs.max_ad_groups || '10' }}
          EXISTING_CAMPAIGN: ${{ github.event.inputs.existing_campaign }}
          EXISTING_AD_GROUPS: ${{ github.event.inputs.existing_ad_groups }}
          BUSINESS_NAME: ${{ github.event.inputs.business_name }}
          NICHE_DESCRIPTION: ${{ github.event.inputs.niche_description }}
          TARGET_LOCATION: ${{ github.event.inputs.target_location }}
        run: python scripts/analyze_with_claude.py

      - name: Stage 3.6 - Generate negative-guard Google Ads Script (~$0.02)
        if: ${{ github.event.inputs.research_type != 'seo' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: claude-sonnet-5
          BUSINESS_NAME: ${{ github.event.inputs.business_name }}
          NICHE_DESCRIPTION: ${{ github.event.inputs.niche_description }}
          TARGET_LOCATION: ${{ github.event.inputs.target_location }}
        run: python scripts/generate_ads_script.py

      - name: Stage 3-SEO - Website-builder content plan (Mode 4 focus, ~$0.20)
        if: ${{ github.event.inputs.research_type == 'seo' || github.event.inputs.research_type == 'both' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: claude-sonnet-5
          CLAUDE_EFFORT: "medium"
          MAX_SEO_CLUSTERS: "8"
          BUSINESS_NAME: ${{ github.event.inputs.business_name }}
          NICHE_DESCRIPTION: ${{ github.event.inputs.niche_description }}
          TARGET_LOCATION: ${{ github.event.inputs.target_location }}
        run: python scripts/generate_seo_strategy.py

      - name: Stage 4 - Generate client-ready HTML + CSV reports
        env:
          BUSINESS_NAME: ${{ github.event.inputs.business_name }}
          NICHE_DESCRIPTION: ${{ github.event.inputs.niche_description }}
          TARGET_LOCATION: ${{ github.event.inputs.target_location }}
        run: python scripts/generate_reports.py

      - name: Stage 5 - Push results for the Netlify form to pick up
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          REQUEST_ID: ${{ steps.reqid.outputs.value }}
          RESULTS_BRANCH: results-data
        run: python scripts/push_results.py

      - name: Upload results as workflow artifact (backup / manual runs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: keyword-strategy-${{ github.event.inputs.business_name }}-${{ github.run_number }}
          path: |
            keyword_data_output.txt
            keyword_data_output.json
            clustered_keywords.json
            scored_keywords.json
            keyword_strategy.json
            keyword_strategy.md
            google_ads_editor.csv
            landing_pages.json
            negative_guard_script.js
            website_builder_inputs.json
            seo_content_plan.md
            keyword_strategy_report.html
            keyword_strategy_targets.csv
