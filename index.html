<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keyword Strategy Generator</title>
<style>
  :root {
    --ink: #14181c;
    --muted: #6b6560;
    --line: #dcdad3;
    --paper: #fdfcfa;
    --bg: #f6f5f2;
    --accent: #0b5d5a;
    --accent-soft: #e3f0ef;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "Roboto Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    line-height: 1.5;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 48px 20px 80px; }
  .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }
  h1 { font-size: 24px; margin: 0 0 24px; }
  label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; margin-top: 18px; }
  label:first-of-type { margin-top: 0; }
  input, textarea {
    width: 100%;
    font-family: var(--sans);
    font-size: 14px;
    padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--paper);
    color: var(--ink);
  }
  input:focus, textarea:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  textarea { resize: vertical; min-height: 64px; }
  .hint { font-size: 12px; color: var(--muted); margin-top: 4px; }
  button {
    margin-top: 26px;
    width: 100%;
    background: var(--accent);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    padding: 13px 16px;
    cursor: pointer;
  }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  #status {
    margin-top: 24px;
    padding: 14px 16px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--paper);
    font-size: 13px;
    color: var(--muted);
  }
  #status.error { color: #9c2b1f; border-color: #f2c9c2; background: #fbe2de; }
  #report-actions { margin-top: 20px; display: flex; gap: 10px; }
  #report-actions button {
    margin-top: 0;
    width: auto;
    background: var(--paper);
    color: var(--accent);
    border: 1px solid var(--accent);
  }
  #report { margin-top: 16px; }
  #report iframe { width: 100%; height: 80vh; border: 1px solid var(--line); border-radius: 8px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">SEOblogy</div>
  <h1>Keyword Strategy Generator</h1>

  <form id="research-form">
    <label for="business_name">Business name</label>
    <input id="business_name" name="business_name" required placeholder="e.g. Awais AC & Plumber">

    <label for="niche_description">Niche / what the business does</label>
    <textarea id="niche_description" name="niche_description" required placeholder="e.g. AC repair, installation and maintenance company"></textarea>

    <label for="target_location">Target location</label>
    <input id="target_location" name="target_location" required placeholder="e.g. Dubai, UAE">

    <label for="research_type">Deliverable type</label>
    <select id="research_type" name="research_type" style="width:100%; padding:10px 12px; border:1px solid #dcdad3; border-radius:8px; font-size:14px; background:#fff;">
      <option value="google_ads">Google Ads — campaigns, ad groups, negatives, guard script</option>
      <option value="seo">SEO — website content plan (clusters, services, questions)</option>
      <option value="both">Both — Ads package + SEO package</option>
    </select>

    <label for="seed_keywords">Seed keywords</label>
    <textarea id="seed_keywords" name="seed_keywords" required placeholder="ac repair dubai, ac not cooling, ac service dubai"></textarea>
    <div class="hint">Comma-separated. 3–6 seed terms works well. Tip: include your city in a few seeds for local data.</div>

    <label for="existing_campaign">Existing campaign name <span style="opacity:.6">(optional — for accounts already running)</span></label>
    <input id="existing_campaign" name="existing_campaign" placeholder="e.g. Plumbing Services Dubai">

    <label for="existing_ad_groups">Existing ad groups <span style="opacity:.6">(optional, comma-separated)</span></label>
    <textarea id="existing_ad_groups" name="existing_ad_groups" placeholder="Emergency Plumbing, Drain Cleaning, Water Heater Repair"></textarea>
    <div class="hint">Fill both to add NEW ad groups into a live account — new groups slot into this campaign with 2-way negative siloing against these groups.</div>

    <label for="max_ad_groups">Max new ad groups <span style="opacity:.6">(optional)</span></label>
    <input id="max_ad_groups" name="max_ad_groups" type="number" min="1" max="10" placeholder="10 (use 1-2 for a small niche service)">

    <button type="submit" id="submit-btn">Generate Report</button>
  </form>

  <div id="status" hidden></div>

  <div id="report-actions" hidden>
    <button id="download-btn" type="button">Download HTML</button>
  </div>
  <div id="report"></div>
</div>

<script>
  const form = document.getElementById("research-form");
  const submitBtn = document.getElementById("submit-btn");
  const statusEl = document.getElementById("status");
  const reportEl = document.getElementById("report");
  const reportActionsEl = document.getElementById("report-actions");
  const downloadBtn = document.getElementById("download-btn");

  const POLL_INTERVAL_MS = 8000;
  const MAX_ATTEMPTS = 40; // ~5-6 minutes total

  let lastHtml = null;
  let lastBusinessName = "report";

  function setStatus(text, isError) {
    statusEl.hidden = false;
    statusEl.textContent = text;
    statusEl.classList.toggle("error", Boolean(isError));
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const data = Object.fromEntries(new FormData(form).entries());
    lastBusinessName = data.business_name || "report";

    submitBtn.disabled = true;
    reportActionsEl.hidden = true;
    reportEl.innerHTML = "";
    setStatus("Starting your report...", false);

    let request_id;
    try {
      const res = await fetch("/trigger-research", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data),
      });
      const json = await res.json();
      if (!res.ok) throw new Error(json.error || "Could not start the report");
      request_id = json.request_id;
    } catch (err) {
      setStatus("Error: " + err.message, true);
      submitBtn.disabled = false;
      return;
    }

    setStatus("Generating your report — this usually takes 1-3 minutes...", false);

    let attempts = 0;
    const poll = async () => {
      attempts++;
      let json;
      try {
        const res = await fetch(`/check-status?request_id=${request_id}`);
        json = await res.json();
      } catch (err) {
        setStatus("Error while checking status: " + err.message, true);
        submitBtn.disabled = false;
        return;
      }

      if (json.status === "ready") {
        lastHtml = json.html;
        statusEl.hidden = true;
        reportActionsEl.hidden = false;

        const iframe = document.createElement("iframe");
        iframe.srcdoc = json.html; // set as a property, not a string attribute — no escaping needed
        reportEl.innerHTML = "";
        reportEl.appendChild(iframe);

        submitBtn.disabled = false;
        return;
      }

      if (json.status === "error") {
        setStatus("Something went wrong while generating the report. Check the GitHub Actions run for details.", true);
        submitBtn.disabled = false;
        return;
      }

      if (attempts >= MAX_ATTEMPTS) {
        setStatus("This is taking longer than expected. Check GitHub Actions, or try again in a few minutes.", true);
        submitBtn.disabled = false;
        return;
      }

      setTimeout(poll, POLL_INTERVAL_MS);
    };

    setTimeout(poll, POLL_INTERVAL_MS);
  });

  downloadBtn.addEventListener("click", () => {
    if (!lastHtml) return;
    const blob = new Blob([lastHtml], { type: "text/html" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `${lastBusinessName.replace(/[^a-z0-9]+/gi, "-").toLowerCase()}-keyword-report.html`;
    a.click();
    URL.revokeObjectURL(url);
  });
</script>
</body>
</html>
